<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Full bleed background (Android applies its own mask shape) -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4780A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#F0E6D6;stop-opacity:0.95"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#grad)"/>

  <!-- Coin circle - centered with safe zone padding -->
  <circle cx="512" cy="460" r="240" fill="url(#coinGrad)" opacity="0.95"/>
  <circle cx="512" cy="460" r="212" fill="none" stroke="#E8910C" stroke-width="7" opacity="0.3"/>

  <!-- Dollar sign -->
  <text x="512" y="516" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="310" font-weight="bold" fill="#E8910C">$</text>

  <!-- Upward trend arrow -->
  <g stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
    <polyline points="300,790 430,715 550,745 710,645"/>
    <polyline points="615,645 710,645 710,740"/>
  </g>
</svg>
