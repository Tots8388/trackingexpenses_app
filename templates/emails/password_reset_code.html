<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#FAFAF7; font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#FFFFFF; border-radius:12px; overflow:hidden; border:1px solid #F0EDE8;">
          <!-- Header -->
          <tr>
            <td style="background:#E8910C; padding:24px 32px; text-align:center;">
              <h1 style="margin:0; color:#FFFFFF; font-size:22px;">Password Reset</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <p style="color:#1A1A1A; font-size:15px; margin:0 0 16px;">
                Hi <strong>{{ user.username }}</strong>,
              </p>
              <p style="color:#6B6B6B; font-size:14px; margin:0 0 24px;">
                You requested a password reset for your Expense Tracker account. Use the code below to set a new password:
              </p>
              <!-- Code -->
              <div style="background:#FFF3E0; border:2px solid #E8910C; border-radius:10px; padding:20px; text-align:center; margin:0 0 24px;">
                <span style="font-size:32px; font-weight:800; letter-spacing:8px; color:#E8910C;">{{ code }}</span>
              </div>
              <p style="color:#6B6B6B; font-size:13px; margin:0 0 8px;">
                This code expires in <strong>10 minutes</strong>.
              </p>
              <p style="color:#9E9E9E; font-size:13px; margin:0;">
                If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background:#FAFAF7; padding:16px 32px; text-align:center; border-top:1px solid #F0EDE8;">
              <p style="color:#9E9E9E; font-size:12px; margin:0;">Expense Tracker</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
