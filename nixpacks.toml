[phases.setup]
nixPkgs = ["...", "nodejs_22"]

[phases.frontend_install]
dependsOn = ["install"]
cmds = ["cd frontend && npm install"]

[phases.frontend_build]
dependsOn = ["frontend_install"]
cmds = ["cd frontend && npm run build"]

[phases.build]
dependsOn = ["frontend_build"]
cmds = [
  "DJANGO_SETTINGS_MODULE=tracking_expenses.settings_prod python manage.py collectstatic --noinput",
  "DJANGO_SETTINGS_MODULE=tracking_expenses.settings_prod python manage.py migrate"
]
